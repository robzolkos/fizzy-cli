name: Classify PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: classify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: write

jobs:
  classify:
    uses: basecamp/.github/.github/workflows/ai-classify-pr.yml@fc560544cd2bb4e242530bde9b0d9deb7863ea45
    with:
      prompt-file: .github/prompts/classify-pr.prompt.yml
      labels: "bug,enhancement,documentation"
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write

  breaking:
    uses: basecamp/.github/.github/workflows/ai-breaking-change.yml@fc560544cd2bb4e242530bde9b0d9deb7863ea45
    with:
      prompt-file: .github/prompts/detect-breaking.prompt.yml
      file-patterns: |
        internal/commands/*.go
        cmd/fizzy/main.go
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write
